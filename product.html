<script>
(function() {
  'use strict';
  
  // Configuration
  var config = {
    websiteId: 'f6b87a73-26d8-45b1-9cd9-c34432b40f65',
    apiUrl: 'https://qaapi.zappy5.com/api/analytics/track',
    sessionDuration: 30 * 60 * 1000, // 30 minutes
    visitorDuration: 30 * 24 * 60 * 60 * 1000, // 30 days
    trackPageViews: true,
    trackClicks: true,
    trackFormSubmissions: true
  };
  
  // Generate or retrieve persistent visitor ID (30 days)
  function getVisitorId() {
    var visitorKey = 'zappy_visitor_' + config.websiteId;
    var visitor = null;
    
    try {
      visitor = localStorage.getItem(visitorKey);
      if (visitor) {
        var visitorData = JSON.parse(visitor);
        var now = Date.now();
        
        // Check if visitor ID is still valid (30 days)
        if (now - visitorData.created < config.visitorDuration) {
          // Update last seen timestamp
          visitorData.lastSeen = now;
          localStorage.setItem(visitorKey, JSON.stringify(visitorData));
          return visitorData.id;
        }
      }
    } catch (e) {
      console.warn('Zappy Analytics: LocalStorage not available');
    }
    
    // Generate new visitor ID
    var newVisitorId = 'zv_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    try {
      localStorage.setItem(visitorKey, JSON.stringify({
        id: newVisitorId,
        created: Date.now(),
        lastSeen: Date.now()
      }));
    } catch (e) {
      // Continue without local storage
    }
    
    return newVisitorId;
  }
  
  // Generate or retrieve session ID (30 minutes)
  function getSessionId() {
    var sessionKey = 'zappy_session_' + config.websiteId;
    var session = null;
    
    try {
      session = sessionStorage.getItem(sessionKey);
      if (session) {
        var sessionData = JSON.parse(session);
        var now = Date.now();
        
        // Check if session is still valid
        if (now - sessionData.timestamp < config.sessionDuration) {
          // Update timestamp
          sessionData.timestamp = now;
          sessionStorage.setItem(sessionKey, JSON.stringify(sessionData));
          return sessionData.id;
        }
      }
    } catch (e) {
      console.warn('Zappy Analytics: SessionStorage not available');
    }
    
    // Generate new session ID
    var newSessionId = 'zs_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    
    try {
      sessionStorage.setItem(sessionKey, JSON.stringify({
        id: newSessionId,
        timestamp: Date.now()
      }));
    } catch (e) {
      // Continue without session storage
    }
    
    return newSessionId;
  }
  
  var visitorId = getVisitorId();
  var sessionId = getSessionId();
  
  // Track an event
  function trackEvent(eventType, data) {
    data = data || {};
    
    var eventData = {
      website_id: config.websiteId,
      event_type: eventType,
      page_path: window.location.pathname,
      referrer: document.referrer || 'direct',
      visitor_id: visitorId,
      session_id: sessionId,
      metadata: data
    };
    
    // Use sendBeacon if available (better for page unload events)
    if (navigator.sendBeacon) {
      var blob = new Blob([JSON.stringify(eventData)], { type: 'application/json' });
      navigator.sendBeacon(config.apiUrl, blob);
    } else {
      // Fallback to fetch
      fetch(config.apiUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(eventData),
        keepalive: true
      }).catch(function(error) {
        console.warn('Zappy Analytics: Failed to track event', error);
      });
    }
  }
  
  // Track page view
  if (config.trackPageViews) {
    trackEvent('pageview', {
      title: document.title,
      url: window.location.href
    });
  }
  
  // Track clicks on important elements
  if (config.trackClicks) {
    document.addEventListener('click', function(e) {
      var target = e.target;
      
      // Track button clicks (counted as actions)
      if (target.tagName === 'BUTTON' || target.closest('button')) {
        var button = target.tagName === 'BUTTON' ? target : target.closest('button');
        trackEvent('click', {
          element: 'button',
          text: button.textContent.trim().substring(0, 100),
          id: button.id || null,
          class: button.className || null
        });
      }
      
      // Track link clicks (navigation - not counted as actions)
      else if (target.tagName === 'A' || target.closest('a')) {
        var link = target.tagName === 'A' ? target : target.closest('a');
        trackEvent('navigation', {
          element: 'link',
          text: link.textContent.trim().substring(0, 100),
          href: link.href,
          external: link.hostname !== window.location.hostname
        });
      }
    }, true);
  }
  
  // Track form submissions
  if (config.trackFormSubmissions) {
    document.addEventListener('submit', function(e) {
      var form = e.target;
      
      trackEvent('form_submit', {
        form_id: form.id || null,
        form_name: form.name || null,
        form_action: form.action || null,
        form_method: form.method || 'GET'
      });
    }, true);
  }
  
  // Track time on page (send on page unload)
  var pageLoadTime = Date.now();
  
  window.addEventListener('beforeunload', function() {
    var timeOnPage = Math.floor((Date.now() - pageLoadTime) / 1000); // in seconds
    
    trackEvent('page_unload', {
      time_on_page: timeOnPage,
      page_path: window.location.pathname
    });
  });
  
  // Expose tracking function globally for custom events
  window.zappyAnalytics = {
    track: trackEvent,
    getVisitorId: function() { return visitorId; },
    getSessionId: function() { return sessionId; }
  };
  
})();
</script>

/* ===========================================
   LANGUAGE DROPDOWN POSITIONING
   CRITICAL: position: absolute !important overrides any
   mobile responsive CSS that resets absolute positioning
   to relative. The dropdown MUST be absolutely positioned
   relative to its parent .lang-switcher.
   
   HIGH SPECIFICITY SELECTORS needed to override:
   [style*="position: absolute"]:not(...) { position: relative !important }
   That selector has specificity ~0,4,0 so we need 0,5,0+ to win
   =========================================== */
.lang-switcher-dropdown,
.lang-switcher .lang-switcher-dropdown,
div.lang-switcher-dropdown,
.nav-cta-container .lang-switcher .lang-switcher-dropdown,
.navbar .nav-cta-container .lang-switcher-dropdown {
  position: absolute !important;
  top: 100% !important;
  /* Default LTR: align dropdown's left edge to switcher's left edge */
  left: 0;
  right: auto;
  margin-top: 6px;
  min-width: 150px;
  background: white;
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  opacity: 0;
  visibility: hidden;
  transform: translateY(-8px);
  transition: all 0.2s ease;
  overflow: hidden;
  z-index: 1002 !important;
}

/* Ultra-high specificity override for problematic mobile responsive CSS */

/* We need 0,5,0+ to win, so we add extra class/attribute selectors */
.lang-switcher .lang-switcher-dropdown[style*="position: absolute"],
.lang-switcher .lang-switcher-dropdown[style*="position:absolute"],
.nav-cta-container .lang-switcher .lang-switcher-dropdown[style],
.navbar .nav-cta-container .lang-switcher-dropdown[style],

  (function() {
    // Unified search function that works in both preview and deployed modes
    function performSearch(query) {
      if (query.length < 2) return;
      
      // Check if we're in preview mode (URL contains preview-fullscreen)
      var isPreview = window.location.pathname.includes('preview-fullscreen');
      
      if (isPreview) {
        // In preview mode, update the page parameter and add search
        var url = new URL(window.location.href);
        url.searchParams.set('page', '/products');
        url.searchParams.set('search', query);
        window.location.href = url.toString();
      } else {
        // In deployed mode, navigate to products with search
        window.location.href = '/products?search=' + encodeURIComponent(query);
      }
    }
    
    // Handle navbar search input
    var navSearchInput = document.querySelector('.nav-search-input');
    if (navSearchInput) {
      navSearchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          performSearch(this.value.trim());
        }
      });
    }
    
    // Handle mobile search panel
    var mobileSearchInput = document.getElementById('mobile-search-input');

      "contact_h1_1": "בואו נדבר על הצעד הבא שלכם בנדל\"ן",
      "contact_h2_2": "בואו נדבר",
      "contact_h2_3": "כל מה שרצית לדעת לפני שמתחילים",
      "contact_h2_4": "שיחה אישית,\nמושכלת ומכוונת",
      "contact_h2_5": "מוכנים להתחיל את הדרך הבאה שלכם?",
      "contact_h3_6": "מאור נדלן 46",
      "contact_h3_7": "איך אנחנו עובדים?",
      "contact_h3_8": "איך נראה תהליך הרכישה עם סוכנות נדלן?",
      "contact_h3_9": "כמה זמן לוקח למצוא דירה מתאימה?",
      "contact_p_17": "בין אם אתם מחפשים לרכוש דירה ראשונה, למכור נכס קיים, לבחון השקעה חכמה בנדל\"ן או סתם להתייעץ לפני שמקבלים החלטה — אנחנו כאן בשבילכם. צוות המומחים שלנו ישמח להקשיב, להבין את הצרכים שלכם ולהציע מענה אישי ומקצועי שמותאם בדיוק למצבכם.",
      "contact_p_18": "אנחנו מאמינים בשירות אישי ואנושי. כל פנייה מקבלת מענה אישי מאחד ממומחי הצוות שלנו — בדרך כלל תוך יום עסקים אחד. סוכנות נדלן שמכירה את השכונה ואת הלקוחות שלה.",
      "contact_p_19": "סוכנות נדלן מובילה — מתמחים ברכישה, מכירה והשקעה בנדל\"ן למגורים ולמשקיעים.",
      "contact_p_20": "אנחנו מעדיפים שיחה אישית — בטלפון, בווטסאפ, או בפגישה פנים אל פנים. כל לקוח מקבל ייעוץ מותאם, בין אם מדובר ברוכשים בפעם הראשונה, במשקיעים המחפשים ייעוץ השקעה בנדלן, או בבעלי דירות המצמצמים.",
      "contact_p_21": "לפני שנצא לדרך יחד, ריכזנו עבורך את השאלות שעולות הכי הרבה מלקוחותינו — תשובות ישירות, ללא עגלה.",
      "contact_p_22": "אנחנו מלווים אותך מהפגישה הראשונה ועד מסירת המפתח — מאפיינים את הצרכים שלך, מסננים נכסים רלוונטיים, מלווים בסיורים, מנהלים משא ומתן ומדריכים אותך בכל שלב משפטי ופיננסי לאורך הדרך.",
      "contact_p_23": "הציר הזמן תלוי בשוק, בתקציב ובדרישות הספציפיות שלך. בממוצע, לקוחותינו מוצאים נכס מתאים תוך שלושה עד שמונה שבועות מרגע שהגדרנו יחד את הקריטריונים. אנחנו לא ממהרים — אנחנו מוצאים את הנכון.",
      "contact_p_24": "מספיק להגיע עם תמונה כללית של מה שאתם מחפשים ואיזה תקציב עומד לרשותכם. אם יש לכם אישור עקרוני מהבנק — מצוין. אם לא — נסביר לכם בדיוק איך להשיג אחד ומה הוא אומר עבורכם בפועל.",
      "contact_p_25": "בהחלט. אנחנו מציעים ייעוץ השקעה בנדלן למשקיעים — בין אם מדובר ברכישה ראשונה להשקעה ובין אם בהרחבת תיק נכסים קיים. נבחן עבורך פוטנציאל תשואה, מיקומים מבוקשים ומגמות שוק רלוונטיות.",
      "contact_p_26": "אנחנו מאמינים בשקיפות מלאה ובזמינות גבוהה. תהיה לך נקודת קשר אחת קבועה שתעדכן אותך בכל התפתחות, תענה על שאלות ותתאם עבורך את כל הגורמים המעורבים — עורכי דין, שמאים, ובנקים.",
      "contact_p_27": "כן. כסוכנות נדלן מנוסה אנחנו מלווים גם מוכרים — החל מהערכת שווי הנכס, דרך קמפיין שיווקי ממוקד ועד ניהול המשא ומתן מול קונים פוטנציאליים. המטרה שלנו היא למקסם את התמורה שתקבלו.",
      "contact_p_28": "אנחנו מאמינים שכל תהליך נדל\"ן מצליח מתחיל בהקשבה אמיתית. הפגישה הראשונה שלנו מוקדשת להבנת המטרות שלך — האם אתה רוכש דירה ראשונה, משקיע מנוסה המחפש ייעוץ השקעה בנדל\"ן, או מבוגר המעוניין לצמצם ולעבור לסביבה מתאימה יותר. אין לחץ, אין מצגות מכירה — רק שיחה פתוחה ומקצועית.",
      "contact_p_29": "במהלך הפגישה נבין יחד את ההקשר שלך, את ציר הזמן הרצוי ואת הסביבה שמתאימה לך ביותר. הידע שלנו על השכונות, השוק והתהליך המשפטי עומד לרשותך — כך שתוכל לקבל החלטות בביטחון ובשקט נפשי.",
      "contact_p_30": "עם ידע מקומי עמוק וליווי אישי לאורך כל הדרך, אנחנו כאן כדי לעזור לכם לקבל החלטות נדל״ן בהירות, בטוחות ומדויקות — בין אם אתם רוכשים לראשונה, משקיעים מנוסים, או מצמצמים לבית הבא.",
      "contact_p_31": "מומחים בנדל\"ן עם ניסיון, מקצועיות ואמינות. אנחנו כאן לעזור לך למצוא את הנכס המושלם.",
      "contact_p_32": "© 2026 מאור נדלן 46. כל הזכויות שמורות.",

      "privacy_p_13": "מאור נדלן 46 (\"החברה\", \"אנו\", \"שלנו\") מחויבת להגן על פרטיותכם. מדיניות פרטיות זו מסבירה כיצד אנו אוספים, \n            משתמשים ומגינים על המידע שלכם בעת השימוש באתר [business_website] (\"השירות\").",

      "privacy_p_16": "אנו לא נמכור, נחכיר או נשתף את המידע האישי שלכם עם צדדים שלישיים, למעט במקרים הבאים:",

      "privacy_p_18": "אתרנו משתמש בעוגיות לשיפור חוויית השימוש. ניתן לנהל את העוגיות דרך הגדרות הדפדפן שלכם. \n            השבתת עוגיות עלולה להשפיע על פונקציונליות האתר.",
      "privacy_p_19": "אנו נוקטים באמצעי אבטחה סבירים להגנה על המידע שלכם, כולל הצפנה, חומות אש ובקרת גישה מוגבלת. \n            עם זאת, אף שיטת העברה או אחסון אינה בטוחה ב-100%.",

      "privacy_p_21": "לשאלות או בקשות בנוגע למדיניות פרטיות זו, ניתן לפנות אלינו:",

      "accessibility_p_18": "זמני מענה: נענה לפניות בנושא נגישות תוך 3 ימי עסקים ונפעל לפתרון תוך 10 ימי עסקים.",

      "legal_privacy_p_10": "[business_name] (\"החברה\", \"אנו\", \"שלנו\") מחויבת להגן על פרטיותכם. מדיניות פרטיות זו מסבירה כיצד אנו אוספים, \n            משתמשים ומגינים על המידע שלכם בעת השימוש באתר www.company.com (\"השירות\").",
      "legal_privacy_p_11": "אנו עשויים לאסוף את סוגי המידע הבאים:",
      "legal_privacy_p_12": "אנו משתמשים במידע שנאסף למטרות הבאות:",
      "legal_privacy_p_13": "אנו לא נמכור, נחכיר או נשתף את המידע האישי שלכם עם צדדים שלישיים, למעט במקרים הבאים:",
      "legal_privacy_p_14": "בהתאם לחוק הגנת הפרטיות התשמ\"א-1981, יש לכם הזכויות הבאות:",
      "legal_privacy_p_15": "אתרנו משתמש בעוגיות לשיפור חוויית השימוש. ניתן לנהל את העוגיות דרך הגדרות הדפדפן שלכם. \n            השבתת עוגיות עלולה להשפיע על פונקציונליות האתר.",
      "legal_privacy_p_16": "אנו נוקטים באמצעי אבטחה סבירים להגנה על המידע שלכם, כולל הצפנה, חומות אש ובקרת גישה מוגבלת. \n            עם זאת, אף שיטת העברה או אחסון אינה בטוחה ב-100%.",
      "legal_privacy_p_17": "אנו עשויים לעדכן מדיניות פרטיות זו מעת לעת. שינויים מהותיים יפורסמו באתר עם הודעה מוקדמת של 30 יום.",
      "legal_privacy_p_18": "לשאלות או בקשות בנוגע למדיניות פרטיות זו, ניתן לפנות אלינו:",
      "legal_privacy_p_19": "רשם מאגרי המידע: לתלונות ניתן לפנות לרשם מאגרי המידע במשרד המשפטים",
      "legal_terms_div_51": "עדכון אחרון: 17.3.2026",
      "legal_terms_div_52": "השימוש באתר זה מהווה הסכמה לתנאי השימוש המפורטים להלן. אנא קראו בעיון לפני השימוש.",
      "neighborhoods_h1_1": "להכיר מקומות,\nלא רק נכסים",
      "neighborhoods_h2_2": "האזורים שאנחנו מכירים מקרוב",
      "neighborhoods_h2_3": "מה שינוי הידע המקומי\nבתהליך החיפוש והמכירה",
      "neighborhoods_h2_4": "שפת הרחוב, אופי השכונה",
      "neighborhoods_h2_5": "איזו שכונה מתאימה בדיוק לכם?",
      "neighborhoods_h3_6": "שכונת המרכז",
      "neighborhoods_h3_7": "השכונה הירוקה",
      "neighborhoods_h3_8": "הרובע החדש",
      "neighborhoods_h3_9": "הקשר תמחור מדויק",
      "neighborhoods_p_16": "סוכנות נדלן | מאור נדלן 46",
      "neighborhoods_p_17": "כל שכונה היא עולם בפני עצמה — אופי רחוב, ארכיטקטורה, קצב חיים, וקהילה שמעצבת את היומיום. אנחנו מאמינים שהבית הנכון מתחיל בהבנה עמוקה של הסביבה שסביבו. בין אם אתם רוכשים לראשונה, משקיעים מנוסים, או מצמצמים לדירה מתאימה יותר — אנחנו מכירים את האזורים שבהם אנו פועלים: הרחובות, הפארקים, בתי הספר, ומה שהופך כל שכונה לייחודית לאורך זמן.",
      "neighborhoods_p_18": "הכרת השכונה היא לא רק יתרון — היא הבסיס לעסקה טובה. כסוכנות נדל\"ן עם ניסיון עמוק בשטח, אנחנו מביאים לכם לא רק נכסים, אלא הבנה אמיתית של האווירה, הקהילה, ואיכות החיים בכל אזור. הידע המקומי שלנו מאפשר לכם לקבל החלטה נכונה — בין אם אתם רוכשים לראשונה, משקיעים מנוסים, או מחפשים את הבית הבא.",
      "neighborhoods_p_19": "לב הפעילות העירונית — רחובות שקטים לצד קפה שוקק, בנייני בוטיק ומגדלי יוקרה שכתפיהם נוגעות. האזור מושך זוגות צעירים ומשקיעים המחפשים ייעוץ השקעה בנדל\"ן למשקיעים עם פוטנציאל השבחה גבוה לאורך זמן.",
      "neighborhoods_p_20": "שכונה שתוכננה בקצב אחר — בתים פרטיים עם גינות, שבילי הליכה, בתי ספר קרובים ומרחב ירוק בשפע. מתאימה במיוחד למשפחות עם ילדים ולמבוגרים המצמצמים שמחפשים שקט ואיכות חיים ללא ויתור על נגישות.",
      "neighborhoods_p_21": "אחד האזורים הצומחים ביותר בעיר — אדריכלות עכשווית, תשתיות חדשות, ופרויקטים חדשים שמגדירים מחדש את המרקם העירוני. מתאים לרוכשים בפעם הראשונה ולמשקיעים המחפשים כניסה מוקדמת לאזורים עם עליית ערך צפויה.",
      "neighborhoods_p_22": "סוכנות נדלן שמכירה את השכונות מבפנים — לא רק מהמפה — יודעת לזהות הזדמנויות שאחרים מפספסים. ייעוץ השקעה בנדלן למשקיעים ולרוכשים כאחד מתחיל בהבנה עמוקה של הסביבה: הרחוב, השכנים, הדינמיקה המקומית. זה ההבדל בין עסקה טובה לעסקה מצוינת.",
      "neighborhoods_p_23": "אנו מכירים את מחירי העסקאות האמיתיים ברחוב הספציפי — לא רק ממוצעי אזור — ומבטיחים שתקנו או תמכרו במחיר הנכון.",
      "neighborhoods_p_24": "כל שכונה מורכבת מכמה מיקרו-אזורים שונים בתכלית. אנחנו יודעים איזה בלוק מתאים לכם — ולא רק איזה שכונה.",
      "neighborhoods_p_25": "רעש, תנועה, תוכניות בנייה עתידיות, בעיות תשתית — אנחנו מגלים את מה שלא רואים בסיור קצר ולא כתוב במודעה.",
      "neighborhoods_p_26": "ידיעה מתי השכונה נמצאת בתנופה ומתי היא בשיא — מאפשרת לנו לייעץ על עיתוי הכניסה והיציאה מהשוק בצורה מיטבית.",
      "neighborhoods_p_27": "כל שכונה היא עולם ומלואו — חזיתות אבן ובטון שמספרות סיפורים, סמטאות שקטות ורחובות רועשים, מרפסות מוצלות ושערים ישנים שמחכים לדרי הבית הבאים. אנחנו במאור נדלן 46 מאמינים שהבנת אופי הסביבה היא הצעד הראשון לבחירה הנכונה.",
      "neighborhoods_p_28": "כל שכונה מספרת סיפור שונה — אווירה, תשואה, פוטנציאל. בין אם אתם מחפשים בית ראשון, משדרגים לסביבה שקטה יותר, או בוחנים השקעה חכמה בנדל\"ן, נשמח לעזור לכם להתאים בין יעדי החיים שלכם לבין הנכס הנכון. בואו נשב יחד ונמצא את ההתאמה המושלמת.",
      "neighborhoods_p_29": "מומחים בנדל\"ן עם ניסיון, מקצועיות ואמינות. אנחנו כאן לעזור לך למצוא את הנכס המושלם.",
      "neighborhoods_p_30": "© 2026 מאור נדלן 46. כל הזכויות שמורות.",

  "lt": {
    "translation": {
      "home_h1_1": "Pažįstame miestą\ngatvė po gatvės",
      "home_h2_2": "Rekomenduojami produktai",
      "home_h2_3": "Pirkite pagal kategoriją",
      "home_h2_4": "Nekilnojamojo turto agentūra, sukurta aplink konsultavimą, o ne sandorių apimtį",
      "home_h2_5": "Skaityti miestą\ntoliau nei skelbimas",
      "home_h2_6": "Pasitikėjimas, pagrįstas vietiniu žinojimu ir visiška skaidrumu",
      "home_h2_7": "Pasiruošę kitam žingsniui?\nPakalbėkime",
      "home_h3_8": "Aukščiausios klasės palydėjimas perkant, parduodant ir protingai investuojant į nekilnojamąjį turtą",
      "home_h3_9": "Gyvenamųjų butų pardavimas",
      "home_p_21": "Nekilnojamojo turto agentūra",
      "home_p_22": "Mes atsineša gilų vietinį žinojimą, profesionalų sprendimą ir individualizuotą darbo procesą — nes kiekvienas sandoris yra daug daugiau nei turtas.",
      "home_p_23": "מאור נדלן 47 mes tikime, kad kiekvienas nekilnojamojo turto sandoris yra daug daugiau nei paprastas pardavimas. Mes lydime pirkėjus visame procese — pilnas atstovavimas pirkėjams, protinga rinkodaros strategija pardavėjams ir investicinis požiūris, padedantis kiekvienam klientui priimti teisingą ir apgalvotą sprendimą.",
      "home_p_24": "Profesionalus ir asmeninis palydėjimas visame pardavimo procese — tikslus vertės įvertinimas, geriausias turto pristatymas ir derybų valdymas, užtikrinantis optimalius rezultatus pardavėjui.",
      "home_p_25": "Individualizuota rinkodaros kampanija kiekvienam turtui — profesionalus fotografavimas, tikslinė ekspozicija tinkamais kanalais ir kainodaros strategija, pritraukianti tinkamiausius pirkėjus.",
      "home_p_26": "Gilus rajono pažinimas už rinkos duomenų ribų — nekilnojamojo turto investicijų konsultavimas investuotojams ir nekilnojamojo turto agentas pirmą kartą pirkantiems, su pilnu vietinio potencialo, aplinkos tendencijų ir tikros gyvenimo kokybės supratimu.",
      "home_p_27": "Kiekvienas turtas yra didesnės istorijos dalis — gatvė, gyvenimo ritmas, pastato charakteris ir kaimynai, kurie paverčia rajoną namais. Mes מאור נדלן 47 pažįstame rajonus iš vidaus: ne tik kainas, bet ir jausmą, kurį patirsite kiekvieną rytą. Taip mes randame jums turtą, kuris tinka ne tik poreikiams — bet gyvenimui.",
      "home_p_28": "Seni rajonai su architektūra, pasakojančia istorijas — pastatai iš mandato laikotarpio, vidiniai kiemiai ir kultūrinis mozaika, išsaugota per kartas. Tiems, kurie ieško gylio ir charakterio, čia plaka širdis.",
      "home_p_29": "Augantys rajonai su nauja infrastruktūra, artumu darbo centrams ir kavos-kultūros-bendruomenės kultūra, pritraukiančia jaunus žmones ir šeimas. Dinamika čia yra vertės dalis.",
      "home_p_30": "Kampelis, apsaugotas nuo miesto triukšmo — žali rajonai, pėsčiųjų takai ir erdvė kvėpuoti. Idealūs šeimoms, mažinantiems poras ir visiems, ieškantis tikros ramybės miesto širdyje.",
      "home_p_31": "Mūsų klientai ateina pas mus su klausimais ir išeina su pasitikėjimu. Kaip vietinė nekilnojamojo turto agentūra, mes pažįstame kiekvieną gatvę, kiekvieną rajoną — ir atsineša šį žinojimą į kiekvieną sandorį.",
      "home_p_32": "\"Kaip pirmą kartą pirkėjai, nežinojome nuo ko pradėti. מאור paaiškino mums kiekvieną etapą kantriai, buvo pasiekiamas su bet kokiu klausimu, ir visada jautėmės, kad mūsų interesai jam svarbiausi. Jo rajono pažinimas buvo stulbinantis.\"",
      "home_p_33": "\"Kreipiausi į מאור dėl nekilnojamojo turto investicijų konsultavimo ir išėjau su sandoriu, kuriuo didžiuojuosi. Jis neparduoda turto — jis kuria strategiją. Jo vietinės rinkos supratimas sutaupė man laiko ir pinigų, ir visada gavau tiesioginius ir sąžiningus atsakymus.\"",
      "home_p_34": "\"Po metų dideliame name nusprendėme sumažinti. מאור tiksliai suprato, ko ieškome — ne tik dydžio atžvilgiu, bet ir vietos, ramybės ir prieinamumo. Jis lydėjo mus visame procese su jautrumu ir tikru profesionalumu.\"",
      "home_p_35": "Nesvarbu, ar svarstote pirkti pirmą butą, parduoti esamą turtą ar apsvarstyti protingą investiciją į nekilnojamąjį turtą — mes čia, kad lydėtume jus kiekviename etape su profesiionaliu, patikimu ir individualizuotu konsultavimu. Nekilnojamojo turto agentūra, kuri klauso ir atsineša rezultatus.",
      "home_p_36": "Nekilnojamojo turto ekspertai su patirtimi, profesionalumu ir patikimumu. Mes čia, kad padėtume jums rasti tobulą turtą.",
      "home_p_37": "© 2026 מאור נדלן 47. Visos teisės saugomos.",
      "about_h1_1": "Jūsų nekilnojamasis turtas,\nmūsų istorija",
      "about_h2_2": "Šaknys rajone,\npaslaugos grindžiamos pasitikėjimu",
      "about_h2_3": "Principai, kurie veda kiekvieną santykį su klientu",
      "about_h2_4": "Kaip mes dirbame kartu",
      "about_h3_5": "46 — nuoseklumas, tikslumas ir rajono raštingumas",
      "about_h3_6": "Skaidrumas komunikacijoje",
      "about_h3_7": "Strateginis mąstymas",
      "about_h3_8": "Gilus rajono pažinimas",
      "about_h3_9": "Jūsų tikslų pažinimas",
      "about_p_16": "Maor nekilnojamasis turtas 46 tikime, kad kiekvienas nekilnojamojo turto sandoris yra daug daugiau nei tik skaičiai popieriuje — tai naujas gyvenimo skyrius. Mūsų gilus patyrimas vietinėje rinkoje kartu su asmeniniu lydėjimu ir tikru žmogišku požiūriu leidžia mums pasiūlyti išskirtinį ir tikslesnį nekilnojamojo turto patyrimą — nesvarbu, ar perkate pirmą kartą, esate patyrę investuotojai, ar ieškote svajonių buto. Mes čia tam, kad kiekvienas proceso žingsnis jaustųsi saugus, aiškus ir tiksliai pritaikytas jums.",
      "about_p_17": "Maor nekilnojamasis turtas 46 gimė iš gilaus pažinimo su gatvėmis, pastatais ir žmonėmis, kurie sudaro miesto audinį. Kaip nekilnojamojo turto agentūra, išaugusi iš bendruomenės, mes atsineša tikrą vietinį žinojimą į kiekvieną sandorį — nuo senųjų rajonų iki naujų projektų, kurie formuoja miesto veidą.",
      "about_p_18": "Mūsų požiūris grindžiamas ilgalaikiais santykiais, o ne vienkartiniais sandoriais. Tikime, kad buto pirkimas yra vienas reikšmingiausių gyvenimo žingsnių, todėl kiekvienas klientas gauna asmeninį lydėjimą, visišką skaidrumą ir nekilnojamojo turto investicijų konsultacijas, grindžiamas tiksliais rinkos duomenimis ir patirtimi, kaupta metai po metų lauke.",
      "about_p_19": "Skaičius 46 yra ne tik pavadinimas — jis primena mums, kad kiekvienas adresas, kiekvienas namo numeris pasakoja visą istoriją. Mes įsipareigojame žinoti tą istoriją prieš pasakodami ją savo klientams.",
      "about_p_20": "Maor nekilnojamasis turtas 46 tikime, kad sėkmingas nekilnojamojo turto sandoris statomas ant pasitikėjimo, strateginio mąstymo ir tikro įsitraukimo į rajoną pamatų. Kiekvienas klientas gauna iš mūsų profesionalų asmeniškai pritaikytą lydėjimą — nuo pirmojo susitikimo iki raktų perdavimo.",
      "about_p_21": "Mes kalbame akis į akį. Be nereikalingo profesionalaus žargono, be tuščių pažadų — tik tikra informacija, nuolatiniai atnaujinimai ir aiškus situacijos vaizdas kiekviename proceso etape. Nekilnojamojo turto agentūra, kuri klientą stato centre, pradeda nuo visiško sąžiningumo.",
      "about_p_22": "Kiekvienas sandoris yra galimybė, reikalaujanti gilaus rinkos analizės, tinkamo laiko ir planavimo į priekį. Mes ne tik randame nekilnojamąjį turtą — mes kartu su klientu kuriame strategiją, kuri tarnauja jo ilgalaikiams tikslams, nesvarbu, ar tai nekilnojamojo turto investicijų konsultacijos investuotojams, ar pirmasis pirkimas.",
      "about_p_23": "Mes gyvename ir kvėpuojame aplinka, kurioje veikiame. Mes pažįstame gatves, planuojamus projektus, nekilnojamojo turto vertes ir vietinę dinamiką — žinias, kurių negalima įsigyti Google, o tik lauke.",
      "about_p_24": "Mūsų nekilnojamojo turto agentūroje kiekvienas pirkimo ar pardavimo procesas vyksta visiškai skaidriai, jums tinkamu tempu — žingsnis po žingsnio, su asmeniniu lydėjimu kiekviename etape.",
      "about_p_25": "Kiekviena kelionė prasideda klausymu. Mes giliai suprantame jūsų poreikius, norus ir apribojimus — nesvarbu, ar perkate pirmą kartą, esate patyrę investuotojai, ar šeima, ieškanti pokyčių. Pirmasis susitikimas yra atviras pokalbis, be spaudimo ir be įsipareigojimų.",
      "about_p_26": "Remdamiesi pažinimu, mes kartu kuriame aiškų ir asmeniškai pritaikytą veiklos planą. Apibrėšime biudžeto ribas, pageidaujamas sritis, realų laiko grafiką ir nubraižysime kelių žemėlapį, kuris nuves jus prie tinkamo nekilnojamojo turto — nesvarbu, ar tai butas gyventi, ar nekilnojamojo turto investicijų konsultacijos.",
      "about_p_27": "Mes skenuojame rinką už jus, filtruojame nekilnojamąjį turtą ir pateikiame tik galimybes, atitinkančias jūsų nustatytus kriterijus. Kiekvienas nekilnojamasis turtas lydimas gilios potencialo, rizikų ir aplinkos būklės analizės — kad galėtumėte priimti išmintingą ir saugų sprendimą.",
      "about_p_28": "Nuo derybų iki sutarties pasirašymo — mes šalia jūsų. Tvarkysime visas biurokratines detales, išmintingai vešime derybas ir užtikrinsime, kad sandoris būtų užbaigtas geriausiais jums sąlygomis. Nekilnojamojo turto agentūra, kuri lydi jus iki galo.",
      "about_p_29": "Tikime, kad geriausi nekilnojamojo turto sprendimai kyla iš ramybės, žinių ir pasitikėjimo. Todėl mes neskubame — mes lydime. Nes galiausiai tinkamas namas yra tas, kuriame jausitės kaip namie.",
      "about_p_30": "Nekilnojamojo turto ekspertai su patirtimi, profesionalumu ir patikimumu. Mes čia, kad padėtume jums rasti tobulą nekilnojamąjį turtą.",
      "about_p_31": "© 2026 Maor nekilnojamasis turtas 46. Visos teisės saugomos.",

      "terms_p_22": "Visas svetainės turinys, įskaitant tekstus, vaizdus, dizainą ir kodą, yra saugomas autorių teisių, priklausančių מאור נדלן 46. \n            Draudžiama kopijuoti, platinti ar naudoti turinį komerciniais tikslais be rašytinio leidimo.",
      "terms_p_23": "Asmeninės informacijos rinkimas ir naudojimas reglamentuojamas mūsų privatumo politika. Svetainės naudojimas reiškia \n            sutikimą su privatumo politika, kaip nurodyta atskirai.",
      "terms_p_24": "Bendrovė turi teisę bet kada keisti šias naudojimo sąlygas. Esminiai pakeitimai bus paskelbti svetainėje su 30 dienų išankstiniu pranešimu.\nToliau naudojantis po pakeitimo reiškia sutikimą su naujomis sąlygomis.",
      "terms_p_25": "Bendrovė turi teisę bet kada nutraukti arba apriboti paslaugą, įskaitant naudojimo sąlygų pažeidimo atvejus.\nPaslaugos nutraukimo atveju išliks atitinkamų straipsnių nuostatos.",
      "terms_p_26": "Šios naudojimo sąlygos yra reglamentuojamos Izraelio valstybės įstatymais. Visi ginčai bus sprendžiami kompetentinguose Izraelio teismuose,\nteikiant pirmenybę arbitražui ar tarpininkavimui, jei įmanoma.",

      "contact_h1_1": "Pakalbėkime apie jūsų kitą žingsnį nekilnojamajame turte",
      "contact_h2_2": "Pakalbėkime",
      "contact_h2_3": "Visa, ką norėjote žinoti prieš pradedant",
      "contact_h2_4": "Asmeninis pokalbis,\nišmintingas ir tikslingas",
      "contact_h2_5": "Pasiruošę pradėti savo kitą kelią?",
      "contact_h3_6": "Maor NT 46",
      "contact_h3_7": "Kaip mes dirbame?",
      "contact_h3_8": "Kaip atrodo pirkimo procesas su nekilnojamojo turto agentūra?",
      "contact_h3_9": "Kiek laiko užtrunka rasti tinkamą butą?",
      "contact_p_17": "Nesvarbu, ar ieškote pirkti pirmą butą, parduoti turimą nekilnojamąjį turtą, apsvarstyti protingą investiciją į nekilnojamąjį turtą ar tiesiog pasitarti prieš priimant sprendimą — mes čia jums. Mūsų ekspertų komanda mielai išklausys, supras jūsų poreikius ir pasiūlys asmeninį bei profesionalų sprendimą, tiksliai pritaikytą jūsų situacijai.",
      "contact_p_18": "Mes tikime asmeniniu ir žmogišku aptarnavimu. Kiekvienas kreipimasis sulaukia asmeninio atsako iš vieno mūsų komandos ekspertų — paprastai per vieną darbo dieną. Nekilnojamojo turto agentūra, kuri pažįsta savo rajoną ir savo klientus.",
      "contact_p_19": "Pirmaujanti nekilnojamojo turto agentūra — specializuojamės gyvenamojo nekilnojamojo turto pirkimu, pardavimu ir investicijomis gyventojams ir investuotojams.",
      "contact_p_20": "Mes teikiame pirmenybę asmeniniam pokalbiui — telefonu, WhatsApp ar susitikime akis į akį. Kiekvienas klientas gauna pritaikytą konsultaciją, nesvarbu, ar tai pirmą kartą perkantys, ar investuotojai, ieškantys nekilnojamojo turto investicijų konsultacijų, ar butų savininkai, kurie mažina turtą.",
      "contact_p_21": "Prieš pradėdami kelionę kartu, surinkome jums dažniausiai mūsų klientų užduodamus klausimus — tiesioginiai atsakymai, be aplinkinių kelių.",
      "contact_p_22": "Mes lydime jus nuo pirmojo susitikimo iki raktų perdavimo — apibūdiname jūsų poreikius, filtruojame tinkamus objektus, lydime apžiūrose, vedame derybas ir vadovaujame jums kiekviename teisinėje ir finansiniame etape visą kelią.",
      "contact_p_23": "Laiko rėmai priklauso nuo rinkos, biudžeto ir jūsų specifinių reikalavimų. Vidutiniškai mūsų klientai randa tinkamą objektą per tris iki aštuonių savaičių nuo momento, kai kartu apibrėžėme kriterijus. Mes neskubame — mes randame tinkamą.",
      "contact_p_24": "Pakanka ateiti su bendru vaizdu to, ko ieškote ir koks biudžetas jums prieinamas. Jei turite preliminarų banko patvirtinimą — puiku. Jei ne — paaiškinsime jums tiksliai, kaip jį gauti ir ką jis reiškia jums praktiškai.",
      "contact_p_25": "Tikrai. Mes siūlome nekilnojamojo turto investicijų konsultacijas investuotojams — nesvarbu, ar tai pirmasis investicinis pirkimas, ar esamo turto portfelio plėtimas. Išnagrinėsime jums grąžos potencialą, pageidaujamas vietas ir aktualias rinkos tendencijas.",
      "contact_p_26": "Mes tikime visiška skaidrumu ir aukštu prieinamumu. Turėsite vieną nuolatinį kontaktinį asmenį, kuris informuos jus apie kiekvieną pokyčį, atsakys į klausimus ir koordinuos jums visus dalyvaujančius subjektus — advokatus, vertintojus ir bankus.",
      "contact_p_27": "Taip. Kaip patyrusi nekilnojamojo turto agentūra mes taip pat lydime pardavėjus — nuo turto vertės įvertinimo, per tikslinę rinkodaros kampaniją iki derybų vedimo su potencialiais pirkėjais. Mūsų tikslas — maksimizuoti jūsų gaunamą atlygį.",
      "contact_p_28": "Mes tikime, kad kiekvienas sėkmingas nekilnojamojo turto procesas prasideda nuo tikro klausymosi. Mūsų pirmasis susitikimas skirtas jūsų tikslų supratimui — ar perkate pirmą butą, esate patyręs investuotojas, ieškantis nekilnojamojo turto investicijų konsultacijų, ar vyresnio amžiaus asmuo, norintis sumažinti turtą ir pereiti į tinkamesnę aplinką. Jokio spaudimo, jokių pardavimo prezentacijų — tik atviras ir profesionalus pokalbis.",
      "contact_p_29": "Susitikimo metu kartu suprasime jūsų kontekstą, pageidaujamą laiko rėmus ir jums labiausiai tinkančią aplinką. Mūsų žinios apie rajonus, rinką ir teisinį procesą yra jūsų žinioje — kad galėtumėte priimti sprendimus su pasitikėjimu ir ramybe.",
      "contact_p_30": "Su giliais vietiniais žiniomis ir asmeniniu lydėjimu visą kelią, mes čia, kad padėtume jums priimti aiškius, saugius ir tikslius nekilnojamojo turto sprendimus — nesvarbu, ar perkate pirmą kartą, esate patyrę investuotojai, ar mažinate turtą kitam namui.",
      "contact_p_31": "Nekilnojamojo turto ekspertai su patirtimi, profesionalumu ir patikimumu. Mes čia, kad padėtume jums rasti tobulą objektą.",
      "contact_p_32": "© 2026 מאור נדלן 46. Visos teisės saugomos.",

      "privacy_p_19": "אנו נוקטים באמצעי אבטחה סבירים להגנה על המידע שלכם, כולל הצפנה, חומות אש ובקרת גישה מוגבלת. \n            עם זאת, אף שיטת העברה או אחסון אינה בטוחה ב-100%.",

      "accessibility_p_12": "מאור נדלן 46 įsipareigoja padaryti paslaugas prieinamas visai visuomenei. Mes siekiame įgyvendinti Izraelio standarto \n            (ת\"י 5568) gaires, pagrįstas WCAG 2.1 gairėmis AA lygiu.",
      "accessibility_p_13": "Mes tikime lygių teisių principais ir kiekvieno žmogaus teise gauti informaciją ir paslaugas savarankiškai ir lygiai. \n            Ši svetainė buvo suprojektuota ir sukurta ypatingą dėmesį skiriant prieinamumui žmonėms su negalia.",
      "accessibility_p_14": "Svetainė atitinka WCAG 2.1 standarto AA lygį, kuris apima:",
      "accessibility_p_15": "Svetainė buvo patikrinta naudojant:",
      "accessibility_p_16": "Mes nuolat dirbame siekdami pagerinti svetainės prieinamumą ir atnaujiname ją pagal technologijų plėtrą ir naudotojų atsiliepimus.",
      "accessibility_p_17": "Jei susidūrėte su prieinamumo problema svetainėje arba reikia pagalbos, prašome kreiptis į mus:",
      "accessibility_p_18": "Atsako laikai: atsakome į prieinamumo užklausas per 3 darbo dienas ir sprendžiame per 10 darbo dienų.",
      "accessibility_p_19": "Skundai: galima pateikti skundą Teisingumo ministerijai - Neįgaliųjų teisių lygybės komisarui",
      "accessibility_p_20": "Nekilnojamojo turto ekspertai su patirtimi, profesionalumu ir patikimumu. Mes čia, kad padėtume jums rasti tobulą nuosavybę.",
      "accessibility_p_21": "© 2026 מאור נדלן 46. Visos teisės saugomos.",

      "legal_privacy_p_10": "[business_name] (\"החברה\", \"אנו\", \"שלנו\") מחויבת להגן על פרטיותכם. מדיניות פרטיות זו מסבירה כיצד אנו אוספים, \n            משתמשים ומגינים על המידע שלכם בעת השימוש באתר www.company.com (\"השירות\").",
      "legal_privacy_p_11": "אנו עשויים לאסוף את סוגי המידע הבאים:",
      "legal_privacy_p_12": "אנו משתמשים במידע שנאסף למטרות הבאות:",
      "legal_privacy_p_13": "אנו לא נמכור, נחכיר או נשתף את המידע האישי שלכם עם צדדים שלישיים, למעט במקרים הבאים:",
      "legal_privacy_p_14": "בהתאם לחוק הגנת הפרטיות התשמ\"א-1981, יש לכם הזכויות הבאות:",
      "legal_privacy_p_15": "אתרנו משתמש בעוגיות לשיפור חוויית השימוש. ניתן לנהל את העוגיות דרך הגדרות הדפדפן שלכם. \n            השבתת עוגיות עלולה להשפיע על פונקציונליות האתר.",
      "legal_privacy_p_16": "אנו נוקטים באמצעי אבטחה סבירים להגנה על המידע שלכם, כולל הצפנה, חומות אש ובקרת גישה מוגבלת. \n            עם זאת, אף שיטת העברה או אחסון אינה בטוחה ב-100%.",
      "legal_privacy_p_17": "אנו עשויים לעדכן מדיניות פרטיות זו מעת לעת. שינויים מהותיים יפורסמו באתר עם הודעה מוקדמת של 30 יום.",
      "legal_privacy_p_18": "לשאלות או בקשות בנוגע למדיניות פרטיות זו, ניתן לפנות אלינו:",
      "legal_privacy_p_19": "רשם מאגרי המידע: לתלונות ניתן לפנות לרשם מאגרי המידע במשרד המשפטים",
      "legal_terms_div_51": "עדכון אחרון: 17.3.2026",
      "legal_terms_div_52": "השימוש באתר זה מהווה הסכמה לתנאי השימוש המפורטים להלן. אנא קראו בעיון לפני השימוש.",
      "neighborhoods_h1_1": "Pažinti vietas,\nne tik objektus",
      "neighborhoods_h2_2": "Rajonai, kuriuos gerai pažįstame",
      "neighborhoods_h2_3": "Kaip vietinių žinių pokytis\nkeičia paieškos ir pardavimo procesą",
      "neighborhoods_h2_4": "Gatvės kalba, rajono charakteris",
      "neighborhoods_h2_5": "Kuris rajonas tiksliai jums tinka?",
      "neighborhoods_h3_6": "Centro rajonas",
      "neighborhoods_h3_7": "Žaliasis rajonas",
      "neighborhoods_h3_8": "Naujasis rajonas",

      "neighborhoods_p_16": "Nekilnojamojo turto agentūra | מאור נדלן 46",
      "neighborhoods_p_17": "Kiekvienas rajonas yra atskiras pasaulis — gatvės charakteris, architektūra, gyvenimo tempas ir bendruomenė, formuojanti kasdienybę. Mes tikime, kad tinkamas namas prasideda nuo gilaus aplinkos supratimo. Nesvarbu, ar perkate pirmą kartą, esate patyrę investuotojai, ar ieškote tinkamesnio būsto — mes pažįstame sritis, kuriose veikiame: gatves, parkus, mokyklas ir tai, kas daro kiekvieną rajoną unikalų ilgainiui.",
      "neighborhoods_p_18": "Rajono pažinimas yra ne tik pranašumas — tai geros sandorio pagrindas. Kaip nekilnojamojo turto agentūra su giliu patirtimi srityje, mes atsineštame jums ne tik objektus, bet ir tikrą atmosferos, bendruomenės ir gyvenimo kokybės supratimą kiekvienoje srityje. Mūsų vietinės žinios leidžia jums priimti teisingą sprendimą — nesvarbu, ar perkate pirmą kartą, esate patyrę investuotojai, ar ieškote kito namų.",
      "neighborhoods_p_19": "Miesto veiklos širdis — tylūs gatvės šalia gyvų kavinių, butikų pastatai ir prabangos bokštai, kurių pečiai susiliečia. Sritis traukia jaunas poras ir investuotojus, ieškančius nekilnojamojo turto investicijų konsultacijų su dideliu vertės augimo potencialu ilgainiui.",
      "neighborhoods_p_20": "Rajonas, suprojektuotas kitu tempu — privatūs namai su sodais, pėsčiųjų takai, artimi mokyklos ir gausu žalių plotų. Ypač tinka šeimoms su vaikais ir vyresniems žmonėms, ieškančių ramybės ir gyvenimo kokybės neprarandant prieinamumo.",
      "neighborhoods_p_21": "Viena sparčiausiai augančių miesto sričių — šiuolaikinė architektūra, nauja infrastruktūra ir nauji projektai, iš naujo apibrėžiantys miesto audinį. Tinka pirmą kartą perkantiems ir investuotojams, ieškančių ankstyvos įėjimo į sritis su tikėtinu vertės augimu.",
      "neighborhoods_p_22": "Nekilnojamojo turto agentūra, pažįstanti rajonus iš vidaus — ne tik iš žemėlapio — moka atpažinti galimybes, kurias kiti praleidžia. Nekilnojamojo turto investicijų konsultacijos tiek investuotojams, tiek pirkėjams prasideda nuo gilaus aplinkos supratimo: gatvės, kaimynų, vietinės dinamikos. Tai skirtumas tarp gero ir puikaus sandorio.",
      "neighborhoods_p_23": "Mes žinome tikrąsias sandorių kainas konkrečioje gatvėje — ne tik srities vidurkius — ir užtikriname, kad pirksite ar parduosite už teisingą kainą.",
      "neighborhoods_p_24": "Kiekvienas rajonas susideda iš kelių visiškai skirtingų mikro-sričių. Mes žinome, kuris kvartalas jums tinka — ne tik kuris rajonas.",
      "neighborhoods_p_25": "Triukšmas, eismas, ateities statybų planai, infrastruktūros problemos — mes atskleidžiame tai, ko nematyti trumpo apžiūros metu ir kas neparašyta skelbime.",
      "neighborhoods_p_26": "Žinojimas, kada rajonas yra pakilimo fazėje ir kada jis piko metu — leidžia mums optimaliai patarti dėl įėjimo ir išėjimo iš rinkos laiko.",
      "neighborhoods_p_27": "Kiekvienas rajonas yra visas pasaulis — akmens ir betono fasadai, pasakojantys istorijas, tylūs skersgatviai ir triukšmingos gatvės, pavėsingi balkonai ir seni vartai, laukiantys kitų namų gyventojų. Mes מאור נדלן 46 tikime, kad aplinkos charakterio supratimas yra pirmasis žingsnis teisingam pasirinkimui.",
      "neighborhoods_p_28": "Kiekvienas rajonas pasakoja skirtingą istoriją — atmosferą, grąžą, potencialą. Nesvarbu, ar ieškote pirmų namų, keičiate į ramesnę aplinką, ar svarstote protingą nekilnojamojo turto investiciją, mielai padėsime jums suderinti gyvenimo tikslus su tinkamu objektu. Ateikite, atsisėskime kartu ir raskime tobulą atitikimą.",
      "neighborhoods_p_29": "Nekilnojamojo turto specialistai su patirtimi, profesionalumu ir patikimumu. Mes čia, kad padėtume jums rasti tobulą objektą.",
      "neighborhoods_p_30": "© 2026 מאור נדלן 46. Visos teisės saugomos.",

  // ============================================
  // LANGUAGE SWITCHER ICON COLOR DETECTION
  // Dynamically detect if navbar has light/dark background
  // and set the globe icon color accordingly
  // ============================================
  function fixLanguageSwitcherColor() {
    var switcher = document.querySelector('.lang-switcher-current');
    var svg = switcher ? switcher.querySelector('svg') : null;
    if (!switcher || !svg) return;
    
    // Find the navbar or header element
    var navbar = document.querySelector('.navbar') || 
                 document.querySelector('nav') || 
                 document.querySelector('header');
    if (!navbar) return;
    
    // Get the effective background color by walking up the DOM tree
    function getEffectiveBackgroundColor(element) {
      var el = element;
      var maxDepth = 10; // Prevent infinite loops
      
      while (el && maxDepth > 0) {
        var style = window.getComputedStyle(el);
        var bg = style.backgroundColor;
        
        // Skip transparent backgrounds
        if (bg && bg !== 'transparent' && bg !== 'rgba(0, 0, 0, 0)') {
          return bg;
        }
        
        // Check background-image for gradients
        var bgImage = style.backgroundImage;
        if (bgImage && bgImage !== 'none') {
          // Extract first color from gradient
          var gradientMatch = bgImage.match(/rgba?\([^)]+\)|#[a-fA-F0-9]{3,8}/);
          if (gradientMatch) {
            return gradientMatch[0];
          }
        }
        
        el = el.parentElement;
        maxDepth--;
      }
      
      // Default to white if no background found (assume light)
      return 'rgb(255, 255, 255)';
    }
    
    // Parse color string to RGB values
    function parseColor(colorStr) {
      if (!colorStr) return null;
      
      // Handle rgb/rgba
      var rgbMatch = colorStr.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
      if (rgbMatch) {
        return {
          r: parseInt(rgbMatch[1], 10),
          g: parseInt(rgbMatch[2], 10),
          b: parseInt(rgbMatch[3], 10)
        };
      }
      
      // Handle hex
      var hexMatch = colorStr.match(/#([a-fA-F0-9]{2})([a-fA-F0-9]{2})([a-fA-F0-9]{2})/);
      if (hexMatch) {
        return {
          r: parseInt(hexMatch[1], 16),
          g: parseInt(hexMatch[2], 16),
          b: parseInt(hexMatch[3], 16)
        };
      }
      
      // Handle 3-digit hex
      var hex3Match = colorStr.match(/#([a-fA-F0-9])([a-fA-F0-9])([a-fA-F0-9])$/);
      if (hex3Match) {
        return {
          r: parseInt(hex3Match[1] + hex3Match[1], 16),
          g: parseInt(hex3Match[2] + hex3Match[2], 16),
          b: parseInt(hex3Match[3] + hex3Match[3], 16)
        };
      }
      
      return null;
    }
    
    // Calculate relative luminance (WCAG formula)
    function getLuminance(rgb) {
      if (!rgb) return 0.5; // Default to middle
      
      var r = rgb.r / 255;
      var g = rgb.g / 255;
      var b = rgb.b / 255;
      
      // Apply gamma correction
      r = r <= 0.03928 ? r / 12.92 : Math.pow((r + 0.055) / 1.055, 2.4);
      g = g <= 0.03928 ? g / 12.92 : Math.pow((g + 0.055) / 1.055, 2.4);
      b = b <= 0.03928 ? b / 12.92 : Math.pow((b + 0.055) / 1.055, 2.4);
      
      return 0.2126 * r + 0.7152 * g + 0.0722 * b;
    }
    
    // Get the effective background color
    var bgColor = getEffectiveBackgroundColor(navbar);
    var rgb = parseColor(bgColor);
    var luminance = getLuminance(rgb);
    
    // Threshold: 0.5 is middle, lower = darker background
    // Use 0.4 as threshold for better contrast
    var isLightBackground = luminance > 0.4;
    
    // Set icon color based on background
    // Light background = dark icon (#1a1a1a)
    // Dark background = light icon (#F3FAFF)
    var iconColor = isLightBackground ? '#1a1a1a' : '#F3FAFF';
    
    svg.style.fill = iconColor;
    switcher.style.color = iconColor;
    
    console.log('[i18n] Language switcher icon color:', iconColor, 
                '(bg luminance:', luminance.toFixed(2), 
                ', isLight:', isLightBackground, ')');
  }

  window.zappyI18n = zappyI18n;

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

    <script id="zappy-mobile-submenu-script">
    (function() {
      function initMobileSubmenuToggles() {
        if (window.innerWidth > 768) {
          document.querySelectorAll('.mobile-submenu-toggle').forEach(function(btn) { btn.remove(); });
          document.querySelectorAll('.sub-menu.mobile-expanded').forEach(function(menu) { menu.classList.remove('mobile-expanded'); });
          return;
        }
        var items = document.querySelectorAll('.nav-menu li:has(.sub-menu), nav li:has(.sub-menu), .navbar li:has(.sub-menu), #navMenu li:has(.sub-menu)');
        items.forEach(function(li) {
          if (li.querySelector('.mobile-submenu-toggle')) return;
          var submenu = li.querySelector('.sub-menu');
          var parentLink = li.querySelector(':scope > a');
          if (!submenu || !parentLink) return;
          var toggleBtn = document.createElement('button');
          toggleBtn.className = 'mobile-submenu-toggle';
          toggleBtn.setAttribute('aria-label', 'Toggle submenu');
          toggleBtn.setAttribute('type', 'button');
          parentLink.insertAdjacentElement('afterend', toggleBtn);
          toggleBtn.addEventListener('click', function(e) {
            e.preventDefault(); e.stopPropagation();
            document.querySelectorAll('.sub-menu.mobile-expanded').forEach(function(menu) {
              if (menu !== submenu) { menu.classList.remove('mobile-expanded'); var t = menu.parentElement.querySelector('.mobile-submenu-toggle'); if(t) t.classList.remove('expanded'); }
            });
            submenu.classList.toggle('mobile-expanded');
            toggleBtn.classList.toggle('expanded');
          });
        });
      }
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initMobileSubmenuToggles); }
      else { initMobileSubmenuToggles(); }
      var resizeTimer; window.addEventListener('resize', function() { clearTimeout(resizeTimer); resizeTimer = setTimeout(initMobileSubmenuToggles, 250); });
      // Re-initialize when mobile menu becomes visible (MutationObserver)
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.type === 'attributes') {
            var target = mutation.target;
            if (target.classList && (target.classList.contains('active') || target.classList.contains('open'))) {
              setTimeout(initMobileSubmenuToggles, 100);
            }
          }
        });
      });
      setTimeout(function() {
        document.querySelectorAll('.mobile-menu, .nav-menu, #navMenu, nav').forEach(function(menu) {
          observer.observe(menu, { attributes: true, attributeFilter: ['class', 'style'] });
        });
      }, 500);
    })();
    </script>

    <script id="zappy-navbar-scroll-effect">
    (function(){
      var nb=document.querySelector('nav.navbar,.navbar:not(.zappy-catalog-menu)');
      var cm=document.querySelector('.zappy-catalog-menu,#zappy-catalog-menu');
      if(!nb)return;
      var fb='rgba(46,49,94,0.85)';
      var th=60;
      var rs=getComputedStyle(document.documentElement);
      var td=rs.getPropertyValue('--text-dark').trim()||'#1a1a1a';
      var tl=rs.getPropertyValue('--text-light').trim()||'#ffffff';
      var st=false?td:tl;
      nb.style.transition='background 0.3s ease,backdrop-filter 0.3s ease,-webkit-backdrop-filter 0.3s ease,box-shadow 0.3s ease';
      if(cm)cm.style.transition='background 0.3s ease,backdrop-filter 0.3s ease,-webkit-backdrop-filter 0.3s ease';
      var neSel='a,.navbar-brand,.navbar-brand a,.dropdown-toggle,.mobile-toggle,.phone-header-btn,.mobile-hamburger-btn,.mobile-close-btn,.mobile-submenu-toggle,.nav-link';
      var skipCls=['cart-link','login-link','nav-search-toggle','search-toggle'];
      function sTC(c,clr){var els=c.querySelectorAll(neSel);for(var i=0;i<els.length;i++){var sk=false;if(els[i].closest('.sub-menu')||els[i].closest('.dropdown-menu')){sk=true;}for(var j=0;j<skipCls.length;j++){if(els[i].classList.contains(skipCls[j])){sk=true;break;}}if(!sk)els[i].style.setProperty('color',clr,'important');}}
      function cTC(c){var els=c.querySelectorAll(neSel);for(var i=0;i<els.length;i++){if(els[i].closest('.sub-menu')||els[i].closest('.dropdown-menu'))continue;els[i].style.removeProperty('color');}}
      function applyScrolled(){
        nb.classList.add('scrolled');
        if(window.innerWidth>768){
          nb.style.setProperty('--frosted-text',st);
          nb.style.setProperty('background-image','none','important');
          nb.style.setProperty('background-color',fb,'important');
          nb.style.backdropFilter='blur(12px)';nb.style.webkitBackdropFilter='blur(12px)';nb.style.boxShadow='0 2px 16px rgba(0,0,0,0.12)';
          sTC(nb,st);
        }
        if(cm){cm.classList.add('scrolled');if(window.innerWidth>768){cm.style.setProperty('background',fb,'important');cm.style.setProperty('backdrop-filter','blur(12px)','important');cm.style.setProperty('-webkit-backdrop-filter','blur(12px)','important');sTC(cm,st);}}
      }
      function onS(){
        if(window._zappyNavNoDarkHero) return;
        if(window.innerWidth<=768){nb.classList.remove('scrolled');cTC(nb);if(cm){cm.classList.remove('scrolled');cTC(cm);}return;}
        var y=window.scrollY||window.pageYOffset;
        if(y>th){
          nb.classList.add('scrolled');nb.style.setProperty('background-color',fb,'important');nb.style.setProperty('background-image','none','important');
          nb.style.setProperty('--frosted-text',st);nb.style.backdropFilter='blur(12px)';nb.style.webkitBackdropFilter='blur(12px)';nb.style.boxShadow='0 2px 16px rgba(0,0,0,0.12)';
          sTC(nb,st);
          if(cm){cm.classList.add('scrolled');cm.style.setProperty('background',fb,'important');cm.style.setProperty('backdrop-filter','blur(12px)','important');cm.style.setProperty('-webkit-backdrop-filter','blur(12px)','important');sTC(cm,st);}
        }else{
          nb.classList.remove('scrolled');nb.style.setProperty('background-color','transparent','important');nb.style.removeProperty('background-image');
          nb.style.removeProperty('--frosted-text');nb.style.backdropFilter='none';nb.style.webkitBackdropFilter='none';nb.style.boxShadow='none';
          cTC(nb);
          if(cm){cm.classList.remove('scrolled');cm.style.setProperty('background','transparent','important');cm.style.setProperty('backdrop-filter','none','important');cm.style.setProperty('-webkit-backdrop-filter','none','important');cTC(cm);}
        }
      }
      function sLum(rv,gv,bv){rv/=255;gv/=255;bv/=255;rv=rv<=0.03928?rv/12.92:Math.pow((rv+0.055)/1.055,2.4);gv=gv<=0.03928?gv/12.92:Math.pow((gv+0.055)/1.055,2.4);bv=bv<=0.03928?bv/12.92:Math.pow((bv+0.055)/1.055,2.4);return 0.2126*rv+0.7152*gv+0.0722*bv;}
      window.addEventListener('scroll',onS,{passive:true});
      window.addEventListener('resize',onS,{passive:true});
      onS();
      var heroEl=document.querySelector('section[class*="hero"],[data-hero-type],main>section:first-child');
      var hasDH=false;
      if(heroEl){var hCs=getComputedStyle(heroEl);var hBI=hCs.backgroundImage;if(hBI&&hBI!=='none'){if(hBI.indexOf('url(')!==-1){var hM2=hCs.backgroundColor.match(/\d+/g);if(hM2&&hM2.length>=3){hasDH=sLum(parseInt(hM2[0]),parseInt(hM2[1]),parseInt(hM2[2]))<0.4;}else{hasDH=true;}}else if(hBI.indexOf('gradient')!==-1){var cM=hBI.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/g);if(cM&&cM.length>0){var tLm=0;for(var ci=0;ci<cM.length;ci++){var pts=cM[ci].match(/\d+/g);tLm+=sLum(parseInt(pts[0]),parseInt(pts[1]),parseInt(pts[2]));}hasDH=(tLm/cM.length)<0.4;}else{hasDH=true;}}else{hasDH=true;}}else{var hM=hCs.backgroundColor.match(/\d+/g);if(hM&&hM.length>=3){hasDH=sLum(parseInt(hM[0]),parseInt(hM[1]),parseInt(hM[2]))<0.4;}}}
      if(!hasDH){window.removeEventListener('scroll',onS);window.removeEventListener('resize',onS);applyScrolled();window._zappyNavNoDarkHero=true;}
    })();
    </script>

    <script id="zappy-mobile-lang-menu-script">
    (function() {
      function initMobileLangMenu() {
        if (window.innerWidth > 768) {
          var existingMenu = document.querySelector('.mobile-lang-menu');
          if (existingMenu) existingMenu.remove();
          return;
        }
        if (document.querySelector('.mobile-lang-menu')) return;
        var switcher = document.querySelector('.lang-switcher');
        if (!switcher) return;
        var dropdown = switcher.querySelector('.lang-switcher-dropdown');
        if (!dropdown) return;
        var options = dropdown.querySelectorAll('.lang-option');
        if (options.length === 0) return;
        var navMenu = document.getElementById('navMenu') || document.querySelector('.nav-menu') || document.querySelector('nav ul');
        if (!navMenu) return;
        var currentLang = document.documentElement.lang || 'en';
        var langConfigs = {
          he: {name:'עברית',flag:'https://api.iconify.design/circle-flags/il.svg'},
          en: {name:'English',flag:'https://api.iconify.design/circle-flags/us.svg'},
          ar: {name:'العربية',flag:'https://api.iconify.design/circle-flags/sa.svg'},
          fr: {name:'Français',flag:'https://api.iconify.design/circle-flags/fr.svg'},
          es: {name:'Español',flag:'https://api.iconify.design/circle-flags/es.svg'},
          de: {name:'Deutsch',flag:'https://api.iconify.design/circle-flags/de.svg'},
          ru: {name:'Русский',flag:'https://api.iconify.design/circle-flags/ru.svg'},
          zh: {name:'中文',flag:'https://api.iconify.design/circle-flags/cn.svg'},
          ja: {name:'日本語',flag:'https://api.iconify.design/circle-flags/jp.svg'},
          pt: {name:'Português',flag:'https://api.iconify.design/circle-flags/br.svg'},
          it: {name:'Italiano',flag:'https://api.iconify.design/circle-flags/it.svg'},
          ko: {name:'한국어',flag:'https://api.iconify.design/circle-flags/kr.svg'}
        };
        var container = document.createElement('div');
        container.className = 'mobile-lang-menu';
        var currentConfig = langConfigs[currentLang] || {name:currentLang,flag:''};
        var toggleBtn = document.createElement('button');
        toggleBtn.className = 'mobile-lang-toggle';
        toggleBtn.type = 'button';
        var currentFlagHtml = currentConfig.flag ? '<img src="' + currentConfig.flag + '" width="20" height="20" alt="" style="border-radius:50%;margin-right:8px;margin-left:8px;">' : '';
        toggleBtn.innerHTML = currentFlagHtml + currentConfig.name;
        container.appendChild(toggleBtn);
        var optionsDiv = document.createElement('div');
        optionsDiv.className = 'mobile-lang-options';
        var currentLink = document.createElement('a');
        currentLink.className = 'mobile-lang-option active';
        currentLink.href = '#';
        currentLink.innerHTML = currentFlagHtml + currentConfig.name;
        optionsDiv.appendChild(currentLink);
        options.forEach(function(opt) {
          var link = document.createElement('a');
          link.className = 'mobile-lang-option';
          link.href = opt.getAttribute('href');
          link.innerHTML = opt.innerHTML;
          optionsDiv.appendChild(link);
        });
        container.appendChild(optionsDiv);
        navMenu.appendChild(container);
        toggleBtn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          toggleBtn.classList.toggle('expanded');
          optionsDiv.classList.toggle('expanded');
        });
      }
      if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', initMobileLangMenu); }
      else { initMobileLangMenu(); }
      window.addEventListener('resize', function() { clearTimeout(window._mlrt); window._mlrt = setTimeout(initMobileLangMenu, 250); });
    })();
    </script>
